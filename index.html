<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Response - IoT Health Monitoring Dashboard</title>
    <!-- Connect Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
                <h1 class="logo-text">Rescue<span>Watch</span></h1>
            </div>
            <nav class="side-nav">
                <ul>
                    <li class="active"><a href="#"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="#"><i class="fa-solid fa-users"></i> Units</a></li>
                    <li><a href="#"><i class="fa-solid fa-map-location-dot"></i> Map View</a></li>
                    <li><a href="#"><i class="fa-solid fa-bell"></i> Alert History</a></li>
                    <li><a href="#"><i class="fa-solid fa-gear"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="emergency-action">
                <button class="btn-emergency"><i class="fa-solid fa-tower-broadcast"></i> SEND BROADCAST</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="header-titles">
                    <h2>Live Monitoring Command Center</h2>
                    <p class="subtitle">Sector 4: Building Collapse Operation</p>
                </div>

                <div class="topbar-actions">
                    <button class="btn-theme-toggle" id="themeToggle" title="Toggle Theme">
                        <i class="fa-solid fa-sun light-icon"></i>
                        <i class="fa-solid fa-moon dark-icon" style="display: none;"></i>
                    </button>
                    <div class="system-status normal" id="systemStatusIndicator">
                        <span class="pulse-dot"></span> System Online
                    </div>
                    <div class="clock" id="liveClock">00:00:00</div>
                    <div class="profile-menu">
                        <img src="https://ui-avatars.com/api/?name=Commander+1&background=0D8ABC&color=fff"
                            alt="Profile" class="avatar">
                    </div>
                </div>
            </header>

            <!-- Overview Stats -->
            <section class="stats-overview">
                <div class="stat-card">
                    <div class="stat-icon bg-blue"><i class="fa-solid fa-users-viewfinder"></i></div>
                    <div class="stat-info">
                        <h3>Active Workers</h3>
                        <p class="stat-value" id="totalWorkers">8</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-green"><i class="fa-solid fa-shield-heart"></i></div>
                    <div class="stat-info">
                        <h3>Stable Conditions</h3>
                        <p class="stat-value text-green" id="stableWorkers">8</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-yellow"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div class="stat-info">
                        <h3>At Risk / Warning</h3>
                        <p class="stat-value text-yellow" id="warningWorkers">0</p>
                    </div>
                </div>
                <div class="stat-card alert-card">
                    <div class="stat-icon bg-red"><i class="fa-solid fa-truck-medical"></i></div>
                    <div class="stat-info">
                        <h3>Critical Alerts</h3>
                        <p class="stat-value text-red" id="criticalWorkers">0</p>
                    </div>
                </div>
            </section>

            <!-- Dynamic Alerts Panel -->
            <section class="alerts-panel hidden" id="alertsPanel">
                <!-- Alerts will be injected here via JS -->
            </section>

            <!-- Workers Grid Layout -->
            <section class="workers-container">
                <div class="section-header">
                    <h3><i class="fa-solid fa-walkie-talkie"></i> Deployed Personnel Activity</h3>
                    <div class="filter-controls">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="critical">Critical</button>
                        <button class="filter-btn" data-filter="warning">Warning</button>
                    </div>
                </div>
                <div class="workers-grid" id="workersGrid">
                    <!-- Worker Cards injected via JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
